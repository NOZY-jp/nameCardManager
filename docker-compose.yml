services:
  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=/api/v1
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://namecard_user:${POSTGRES_PASSWORD}@db:5432/namecard
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=["https://name.nozyjp.com"]
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - IMAGE_DIR=/app/uploads/images
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - upload_data:/app/uploads
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    command: postgres -c shared_preload_libraries=pg_bigm
    environment:
      POSTGRES_USER: namecard_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: namecard
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namecard_user -d namecard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:
