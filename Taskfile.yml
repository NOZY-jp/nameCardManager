# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv:
  - ".env"

vars:
  COMPOSE_CMD:
    sh: |
      if command -v docker compose >/dev/null 2>&1; then echo "docker compose"; elif command -v docker-compose >/dev/null 2>&1; then echo "docker-compose"; else echo "docker compose"; fi

includes:
  frontend:
    taskfile: ./Taskfile/Taskfile.frontend.yml
    dir: ./frontend

  backend:
    taskfile: ./Taskfile/Taskfile.backend.yml
    dir: ./backend

tasks:
  default:
    desc: 利用可能なタスク一覧を表示
    cmd: task --list

  # ----------------------------------------------------------------
  # 全体操作コマンド
  # ----------------------------------------------------------------
  dev:
    desc: 🚀 フロントとバックを同時に起動
    cmd: "task dev:start"

  dev:start:
    deps:
      - task: backend:dev
      - task: frontend:dev

  install:
    desc: 📦 全体の依存関係をインストール
    cmds:
      - task: backend:install
      - task: frontend:install

  clean:
    desc: 🧹 全ビルド成果物とキャッシュを削除
    cmds:
      - rm -rf frontend/.next frontend/node_modules
      - rm -rf backend/.venv backend/.pytest_cache backend/.ruff_cache
      - find backend -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  kill-ports:
    desc: 🔪 必要なポート (3000, 5432, 8000) を占有するプロセスを停止
    vars:
      PORTS: "3000 5432 8000"
    cmds:
      - |
        for port in {{.PORTS}}; do
          pid=$(lsof -ti ":${port}" 2>/dev/null || true)
          if [ -n "$pid" ]; then
            echo "Killing process(es) on port ${port}: ${pid}"
            echo "$pid" | xargs kill -9 2>/dev/null || true
          else
            echo "Port ${port} is free"
          fi
        done

  clean-start:
    desc: 🔄 クリーンリビルド後にDockerで全サービスを起動
    cmds:
      - task: kill-ports
      - task: down
      - task: clean
      - task: install
      - task: frontend:build
      - task: up
      - task: db:migrate

  # ----------------------------------------------------------------
  # インフラ関連
  # ----------------------------------------------------------------
  up:
    desc: DBコンテナなどを起動
    cmd: "{{.COMPOSE_CMD}} up -d"

  down:
    desc: コンテナを停止
    cmd: "{{.COMPOSE_CMD}} down"

  db:migrate:
    desc: 🗄️ Dockerコンテナ内でDBマイグレーションを実行
    cmd: "{{.COMPOSE_CMD}} exec backend alembic upgrade head"
